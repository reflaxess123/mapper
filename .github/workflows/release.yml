name: Release

# Builds the Windows NSIS installer on every `v*` tag and publishes it
# as a GitHub Release asset. Trigger by:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: write   # required to create the Release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri bundle (NSIS)
        run: npm run tauri -- build --bundles nsis

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          # The NSIS bundler emits `MindMapper_<version>_x64-setup.exe`
          # and a matching `.nsis.zip` for updater support.
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
          generate_release_notes: true
